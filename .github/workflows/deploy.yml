name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# GitHub Pages needs these permissions on the workflow's GITHUB_TOKEN.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # portalId / formGuid are PUBLIC, but we still inject them at build time
        # because Vite inlines VITE_* env vars into the bundle. Storing them as
        # repo variables (not secrets) keeps them editable without code changes.
        env:
          VITE_HUBSPOT_PORTAL_ID: ${{ vars.HUBSPOT_PORTAL_ID }}
          VITE_HUBSPOT_FORM_GUID: ${{ vars.HUBSPOT_FORM_GUID }}
          VITE_HUBSPOT_SMS_CONSENT_PROPERTY: ${{ vars.HUBSPOT_SMS_CONSENT_PROPERTY }}
          VITE_HUBSPOT_SMS_CONSENT_TS_PROPERTY: ${{ vars.HUBSPOT_SMS_CONSENT_TS_PROPERTY }}
          VITE_HUBSPOT_SMS_CONSENT_VERSION_PROPERTY: ${{ vars.HUBSPOT_SMS_CONSENT_VERSION_PROPERTY }}
          VITE_PRIVACY_URL: ${{ vars.PRIVACY_URL }}
          VITE_TERMS_URL: ${{ vars.TERMS_URL }}
          # Google tags. Unset => no Google script is loaded at all, which is the
          # right default for preview/fork builds.
          VITE_GTM_ID: ${{ vars.GTM_ID }}
          VITE_GA4_ID: ${{ vars.GA4_ID }}
          # Vite base path. A PROJECT page (user.github.io/<repo>/) must build with
          # base='/<repo>/' or every asset URL 404s. Set the BASE_PATH repo variable
          # to '/<repo>/' for a project page; leave it unset for a user/org page,
          # where this falls back to '/'.
          BASE_PATH: ${{ vars.BASE_PATH || '/' }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite outputs to ./dist. (Next static export → ./out; CRA → ./build.)
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
